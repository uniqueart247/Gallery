<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniqueArts247 Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    header {
      text-align: center;
      padding: 50px 20px;
      background: #000;
    }

    header h1 {
      font-size: 45px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
      color: #ccc;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .gallery img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 25px;
      background: #000;
      color: #aaa;
    }
  </style>
</head>

<body>

<header>
  <h1>UniqueArts247 Gallery</h1>
  <p>Capturing moments. Creating timeless visual stories.</p>
</header>

<section class="gallery">

  <img src="https://picsum.photos/600/400?random=1" alt="Artwork 1">
  <img src="https://picsum.photos/600/400?random=2" alt="Artwork 2">
  <img src="https://picsum.photos/600/400?random=3" alt="Artwork 3">
  <img src="https://picsum.photos/600/400?random=4" alt="Artwork 4">
  <img src="https://picsum.photos/600/400?random=5" alt="Artwork 5">
  <img src="https://picsum.photos/600/400?random=6" alt="Artwork 6">

</section>

<footer>
  © 2026 UniqueArts247 Gallery — All Rights Reserved
</footer>

</body>
</html>
